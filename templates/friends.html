<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends</title>
</head>
<body>
    <h1>Your Friends</h1>
    <ul>
        {% for friend in friends %}
        <li>{{ friend[1] }} - Phone: {{ friend[2] }}, Email: {{ friend[3] }}</li>
        {% endfor %}
    </ul>
    <a href="{{ url_for('home') }}">Back to Home</a>
</body>
</html>
